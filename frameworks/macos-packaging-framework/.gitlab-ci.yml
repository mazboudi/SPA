##=============================================================================
## macos-packaging-framework — GitLab CI Pipeline
##=============================================================================
## Triggered by a tag in the format vX.Y.Z (e.g. v1.0.0).
##
## Stages:
##   test    — bash -n syntax check on all .sh files in the version dir
##   build   — create tar.gz bundle with SHA-256 checksum
##   publish — upload to GitLab Generic Package Registry + create GitLab release
##
## Required CI variables (set at GitLab group or project level):
##   GITLAB_RELEASE_TOKEN  — access token with api scope (protected)
##
## Runner requirements:
##   - macOS runner tagged [macOS]
##   - bash, tar, shasum, python3, curl all available (standard on macOS)
##   - Optional: yq (brew install yq) for YAML parsing in build-pkg.sh
##=============================================================================

stages:
  - test
  - build
  - publish

variables:
  FF_USE_FASTZIP: "true"
  GIT_DEPTH: "1"

## ---------------------------------------------------------------------------
## test — bash syntax check on all .sh files in the version directory
## ---------------------------------------------------------------------------
test_shell_syntax:
  stage: test
  tags: [macOS]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - |
      set -euo pipefail

      # Derive version: strip leading 'v' from tag, or use latest dir on branches
      if [[ -n "${CI_COMMIT_TAG:-}" ]]; then
        VERSION="${CI_COMMIT_TAG#v}"
      else
        VERSION=$(ls -1 versions | sort -V | tail -1)
      fi
      echo "Testing version: $VERSION"

      VERSION_DIR="versions/$VERSION"
      if [[ ! -d "$VERSION_DIR" ]]; then
        echo "ERROR: Version directory not found: $VERSION_DIR"
        exit 1
      fi

      ERRORS=0
      while IFS= read -r -d '' f; do
        if bash -n "$f" 2>&1; then
          echo "  ✓ $f"
        else
          echo "  ✗ $f"
          ERRORS=$((ERRORS+1))
        fi
      done < <(find "$VERSION_DIR" scripts/ -name '*.sh' -print0 2>/dev/null)

      if [[ $ERRORS -gt 0 ]]; then
        echo "❌ $ERRORS shell script(s) have syntax errors."
        exit 1
      fi
      echo "✅ All shell scripts passed syntax check."

## ---------------------------------------------------------------------------
## build — create the versioned tar.gz bundle
## ---------------------------------------------------------------------------
build_bundle:
  stage: build
  tags: [macOS]
  needs: [test_shell_syntax]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - |
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG#v}"
      echo "Building bundle for version: $VERSION"

      bash scripts/build-framework-bundle.sh "$VERSION"

      echo "Bundle contents:"
      ls -lh dist/
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - dist/*.tar.gz
      - dist/checksums.json
      - dist/bundle.env
    reports:
      dotenv: dist/bundle.env

## ---------------------------------------------------------------------------
## publish — upload to Package Registry and create a GitLab release
## ---------------------------------------------------------------------------
publish_bundle:
  stage: publish
  tags: [macOS]
  needs:
    - job: build_bundle
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: on_success
  script:
    - |
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG#v}"
      echo "Publishing macos-packaging-framework v$VERSION to Package Registry..."

      bash scripts/new-framework-release.sh "$VERSION"
  environment:
    name: production
    url: $CI_PROJECT_URL/-/packages
