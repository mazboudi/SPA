##=============================================================================
## psadt-enterprise — GitLab CI Pipeline
##=============================================================================
## Triggered by a tag in the format vX.Y.Z (e.g. v4.1.0).
##
## Stages:
##   test    — PowerShell syntax check on all .ps1 files in the version dir
##   build   — zip the versioned bundle and compute SHA-256 checksum
##   publish — upload to GitLab Generic Package Registry + create GitLab release
##
## Required CI variables (set at GitLab group or project level):
##   GITLAB_RELEASE_TOKEN  — access token with api scope (protected)
##                           Used by New-FrameworkRelease.ps1 to upload +
##                           create the release. CI_JOB_TOKEN is NOT sufficient
##                           for creating releases in the API.
##=============================================================================

stages:
  - test
  - build
  - publish

variables:
  POWERSHELL_TELEMETRY_OPTOUT: "1"
  FF_USE_FASTZIP: "true"
  GIT_DEPTH: "1"

## ---------------------------------------------------------------------------
## test — validate PowerShell syntax on all .ps1 files in the version dir
## ---------------------------------------------------------------------------
test_template_syntax:
  stage: test
  tags: [Windows]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - |
      $ErrorActionPreference = "Stop"

      # Derive version: strip leading 'v' from tag, or use 'latest' on branches
      if ($env:CI_COMMIT_TAG) {
        $VERSION = $env:CI_COMMIT_TAG -replace '^v', ''
      } else {
        # On branches: test against the highest existing version dir
        $VERSION = (Get-ChildItem -Path versions -Directory | Sort-Object Name | Select-Object -Last 1).Name
      }
      Write-Host "Testing version: $VERSION"

      $versionDir = "versions\$VERSION"
      if (!(Test-Path $versionDir)) {
        throw "Version directory not found: $versionDir"
      }

      $scripts = Get-ChildItem -Path $versionDir -Filter '*.ps1' -Recurse
      $syntaxErrors = [System.Collections.Generic.List[string]]::new()

      foreach ($script in $scripts) {
        $parseErrors = $null
        $null = [System.Management.Automation.Language.Parser]::ParseFile(
          $script.FullName, [ref]$null, [ref]$parseErrors
        )
        if ($parseErrors.Count -gt 0) {
          foreach ($e in $parseErrors) {
            $syntaxErrors.Add("$($script.FullName):$($e.Extent.StartLineNumber): $($e.Message)")
          }
        }
      }

      if ($syntaxErrors.Count -gt 0) {
        Write-Host "❌ Syntax errors found:" -ForegroundColor Red
        $syntaxErrors | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
        throw "PowerShell syntax check failed with $($syntaxErrors.Count) error(s)."
      }

      Write-Host "✅ $(@($scripts).Count) .ps1 file(s) passed syntax check." -ForegroundColor Green

## ---------------------------------------------------------------------------
## build — create the versioned zip bundle and capture dotenv
## ---------------------------------------------------------------------------
build_bundle:
  stage: build
  tags: [Windows]
  needs: [test_template_syntax]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - |
      $ErrorActionPreference = "Stop"
      $VERSION = $env:CI_COMMIT_TAG -replace '^v', ''
      Write-Host "Building bundle for version: $VERSION"

      pwsh -NoProfile -ExecutionPolicy Bypass `
        -File scripts/build-framework-bundle.ps1 `
        -Version $VERSION `
        -OutDir dist

      Write-Host "Bundle contents:"
      Get-ChildItem dist | Format-Table Name, Length -AutoSize
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - dist/*.zip
      - dist/checksums.json
      - dist/bundle.env
    reports:
      dotenv: dist/bundle.env

## ---------------------------------------------------------------------------
## publish — upload to Package Registry and create a GitLab release
## Runs automatically on tag (no manual gate here — publish is the final step
## after the build artifact has been reviewed in the pipeline).
## To require manual approval, change `when: on_success` to `when: manual`.
## ---------------------------------------------------------------------------
publish_bundle:
  stage: publish
  tags: [Windows]
  needs:
    - job: build_bundle
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: on_success
  script:
    - |
      $ErrorActionPreference = "Stop"
      $VERSION = $env:CI_COMMIT_TAG -replace '^v', ''
      Write-Host "Publishing psadt-enterprise v$VERSION to Package Registry..."

      pwsh -NoProfile -ExecutionPolicy Bypass `
        -File scripts/New-FrameworkRelease.ps1 `
        -Version $VERSION `
        -GitLabApiUrl "$env:CI_API_V4_URL" `
        -ProjectId "$env:CI_PROJECT_ID"
  environment:
    name: production
    url: $CI_PROJECT_URL/-/packages
