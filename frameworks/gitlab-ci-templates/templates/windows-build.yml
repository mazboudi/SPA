##=============================================================================
## windows-build.yml — Windows PSADT build CI template
## Include: project: <group>/gitlab-ci-templates, file: templates/windows-build.yml
##
## Variables consumed:
##   WINDOWS_ENABLED            — Must be 'true' to activate this job
##   PSADT_FRAMEWORK_VERSION    — e.g. '4.1.0' (matches psadt-enterprise tag)
##   PSADT_PROJECT_ID           — GitLab project ID of psadt-enterprise repo
##   GITLAB_READ_TOKEN          — Token with read_api + read_registry scope
##   INTUNE_MODULES_PROJECT_ID  — (optional) GitLab project ID of intune-deployment-modules
##                                 Required only when lifecycle.yaml is present (new titles)
##   INTUNE_MODULES_REF         — (optional) Ref/tag for intune-deployment-modules (default: main)
##
## This job assembles the full PSADT staging area and writes package metadata
## to out/build.env. It does NOT run IntuneWinAppUtil — the .intunewin file is
## created by windows-deploy-intune (deploy-intune stage) so that the PSADT
## package can be downloaded and inspected without generating the large binary.
##
## Produces artifacts:
##   out/staging/               — Assembled PSADT staging area (framework + title overlay)
##   out/build.env              — Dotenv: PKG_ID, VENDOR_VERSION, PACKAGING_VERSION, PLATFORM
##=============================================================================

.windows_build:
  stage: build
  tags: [Windows]
  variables:
    PSADT_FRAMEWORK_VERSION: "4.1.0"
  script:
    - |
      $ErrorActionPreference = "Stop"
      $POWERSHELL_TELEMETRY_OPTOUT = "1"

      Write-Host "=== Windows Build: $($env:CI_PROJECT_NAME) ===" -ForegroundColor Cyan
      Write-Host "Pipeline tag   : $($env:CI_COMMIT_TAG)"

      ## 1 — Read metadata & Validate against Schemas
      Write-Host "--- Verifying powershell-yaml module is present ---"
      Import-Module powershell-yaml -ErrorAction Stop

      Write-Host "--- Downloading JSON Schemas ---"
      New-Item -ItemType Directory -Path 'schemas' -Force | Out-Null
      $schemaHeaders = @{ 'PRIVATE-TOKEN' = $env:GITLAB_READ_TOKEN }
      $schemasId = $env:SCHEMAS_PROJECT_ID
      $ref = $env:SCHEMA_VERSION ?? 'main'
      
      foreach ($s in @('app.schema.json', 'windows-package.schema.json', 'intune-requirements.schema.json')) {
        $encodedPath = [uri]::EscapeDataString("schemas/$s")
        $url = "$($env:CI_API_V4_URL)/projects/$schemasId/repository/files/$encodedPath/raw?ref=$ref"
        try {
          Invoke-WebRequest -Uri $url -Headers $schemaHeaders -OutFile "schemas/$s" -ErrorAction Stop
        } catch {
          throw "Failed to download $s from SCHEMAS_PROJECT_ID ($schemasId). Ensure the variable is set and token has read_api access."
        }
      }

      if (!(Test-Path 'app.json')) { throw "app.json not found" }
      $app = Get-Content 'app.json' -Raw | ConvertFrom-Json

      Write-Host "--- Validating app.json against schema ---"
      $appJsonBody = Get-Content 'app.json' -Raw
      $appSchema   = Get-Content "schemas/app.schema.json" -Raw
      $appIsValid  = Test-Json -Json $appJsonBody -Schema $appSchema -ErrorAction Stop
      if (-not $appIsValid) { throw "app.json failed JSON Schema validation!" }
      
      if ($app.lifecycle -eq 'retired') {
        Write-Warning "app.json: lifecycle=retired — skipping build."
        exit 0
      }
      Write-Host "  ✓ app.json valid"

      ## Override PSADT Framework Version using app.json metadata
      if ($app.platforms.windows.framework_version) {
        $env:PSADT_FRAMEWORK_VERSION = $app.platforms.windows.framework_version
      }
      Write-Host "PSADT version locked to: $($env:PSADT_FRAMEWORK_VERSION)"

      if (!(Test-Path 'windows/package.yaml')) { throw "windows/package.yaml not found" }

      Write-Host "--- Validating windows/package.yaml against schema ---"
      $winPkgJson   = ConvertTo-Json (ConvertFrom-Yaml (Get-Content 'windows/package.yaml' -Raw)) -Depth 20
      $pkgSchema    = Get-Content "schemas/windows-package.schema.json" -Raw
      $pkgIsValid   = Test-Json -Json $winPkgJson -Schema $pkgSchema -ErrorAction Stop
      if (-not $pkgIsValid) { throw "windows/package.yaml failed JSON Schema validation!" }
      Write-Host "  ✓ windows/package.yaml valid"

      if (Test-Path 'windows/intune/requirements.json') {
        Write-Host "--- Validating windows/intune/requirements.json against schema ---"
        $reqJson     = Get-Content 'windows/intune/requirements.json' -Raw
        $reqSchema   = Get-Content "schemas/intune-requirements.schema.json" -Raw
        $reqIsValid  = Test-Json -Json $reqJson -Schema $reqSchema -ErrorAction Stop
        if (-not $reqIsValid) { throw "windows/intune/requirements.json failed JSON Schema validation!" }
        Write-Host "  ✓ windows/intune/requirements.json valid"
      }

      ## 2 — Download psadt-enterprise framework bundle
      $frameworkDir = "psadt-framework-$($env:PSADT_FRAMEWORK_VERSION)"
      if (!(Test-Path $frameworkDir)) {
        $pkgUri = "$($env:CI_API_V4_URL)/projects/$($env:PSADT_PROJECT_ID)/packages/generic/psadt-enterprise/$($env:PSADT_FRAMEWORK_VERSION)/psadt-enterprise-$($env:PSADT_FRAMEWORK_VERSION).zip"
        Write-Host "Downloading PSADT bundle from: $pkgUri"
        $headers = @{ 'PRIVATE-TOKEN' = $env:GITLAB_READ_TOKEN }
        $zipPath = "$frameworkDir.zip"
        Invoke-WebRequest -Uri $pkgUri -Headers $headers -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $frameworkDir -Force
        Remove-Item $zipPath
        Write-Host "Framework extracted to: $frameworkDir"
      } else {
        Write-Host "Using cached framework: $frameworkDir"
      }

      ## 2b — Validate framework bundle contents
      Write-Host "=== Framework bundle contents ($frameworkDir) ===" -ForegroundColor DarkGray
      Get-ChildItem -Path $frameworkDir -Recurse -Depth 1 | ForEach-Object {
        $rel = $_.FullName.Substring($frameworkDir.Length)
        $size = if (!$_.PSIsContainer) { " ($($_.Length) bytes)" } else { "/" }
        Write-Host "  $rel$size" -ForegroundColor DarkGray
      }
      $fwExe = Join-Path $frameworkDir 'Invoke-AppDeployToolkit.exe'
      if (!(Test-Path $fwExe)) {
        Write-Warning "⚠ Invoke-AppDeployToolkit.exe NOT found in framework bundle!"
        Write-Warning "  The bundle may be empty, corrupted, or not yet published."
        Write-Warning "  Ensure the psadt-enterprise pipeline has run its build+publish stages."
      }

      ##     In production, the psadt-enterprise bundle should already include
      ##     the upstream PSADT in a PSAppDeployToolkit/ subfolder.
      $psadtRuntime = Join-Path $frameworkDir 'PSAppDeployToolkit'
      if (!(Test-Path $psadtRuntime)) {
        Write-Warning "PSAppDeployToolkit runtime not found in framework bundle."
        Write-Warning "Expected path: $psadtRuntime"
        Write-Warning "Please add the PSADT runtime to the psadt-enterprise bundle."
      }

      ## 3 — Generate / locate Invoke-AppDeployToolkit.ps1
      ##     New titles use lifecycle.yaml (declarative); legacy titles commit the .ps1 directly.
      ##     Refactored v3 titles include Deploy-Application.ps1 + v3_conversion flag.
      $titleDeploy = 'windows/src/Invoke-AppDeployToolkit.ps1'
      $lifecyclePath = 'windows/lifecycle.yaml'
      $v3Script = 'windows/src/Deploy-Application.ps1'

      if (Test-Path $lifecyclePath) {
        Write-Host "--- Generating Invoke-AppDeployToolkit.ps1 from lifecycle.yaml ---" -ForegroundColor Cyan

        # Download lifecycle builder scripts from intune-deployment-modules
        $lcModulesDir = 'intune-modules'
        if (!(Test-Path $lcModulesDir)) { New-Item -ItemType Directory -Path $lcModulesDir | Out-Null }
        $lcHeaders = @{ 'PRIVATE-TOKEN' = $env:GITLAB_READ_TOKEN }
        $lcRef = $env:INTUNE_MODULES_REF ?? 'main'
        $lcScripts = @('Build-PsadtFromLifecycle.ps1', 'Build-DeployApplication.ps1', 'IntuneDeployment.psm1')
        foreach ($lcScript in $lcScripts) {
          $encoded = [uri]::EscapeDataString("scripts/$lcScript")
          $uri = "$($env:CI_API_V4_URL)/projects/$($env:INTUNE_MODULES_PROJECT_ID)/repository/files/$encoded/raw?ref=$lcRef"
          $dest = Join-Path $lcModulesDir $lcScript
          try {
            Invoke-WebRequest -Uri $uri -Headers $lcHeaders -OutFile $dest -ErrorAction Stop
          } catch {
            throw "Failed to download $lcScript from intune-deployment-modules. Ensure INTUNE_MODULES_PROJECT_ID is set."
          }
        }

        # Ensure output directory exists
        $deployDir = Split-Path $titleDeploy -Parent
        if (!(Test-Path $deployDir)) { New-Item -ItemType Directory -Path $deployDir -Force | Out-Null }

        # Generate the PSADT script
        & "$lcModulesDir/Build-PsadtFromLifecycle.ps1" `
            -LifecyclePath  $lifecyclePath `
            -PackageYamlPath 'windows/package.yaml' `
            -AppJsonPath     'app.json' `
            -OutputPath      $titleDeploy `
            -FrameworkVersion $env:PSADT_FRAMEWORK_VERSION

        if (!(Test-Path $titleDeploy)) {
          throw "Build-PsadtFromLifecycle.ps1 did not produce $titleDeploy"
        }
        Write-Host "  ✓ Generated $titleDeploy from lifecycle.yaml"

      } elseif (Test-Path $v3Script) {
        ## v3 → v4 conversion (refactored title with Deploy-Application.ps1)
        Write-Host "--- Converting v3 Deploy-Application.ps1 to v4 ---" -ForegroundColor Cyan
        Install-Module -Name PSAppDeployToolkit.Tools -Scope CurrentUser -AllowPrerelease -Force -ErrorAction Stop

        # Run compatibility report first
        Write-Host "Running Test-ADTCompatibility..." -ForegroundColor DarkCyan
        $compatReport = Test-ADTCompatibility -FilePath $v3Script -Format List 2>&1
        $compatReport | ForEach-Object { Write-Host "  $_" -ForegroundColor DarkGray }

        # Convert v3 → v4
        Write-Host "Running Convert-ADTDeployment..." -ForegroundColor DarkCyan
        Convert-ADTDeployment -Path $v3Script -ErrorAction Stop

        # Convert-ADTDeployment creates the v4 script in the same directory
        if (Test-Path $titleDeploy) {
          Write-Host "  ✓ Converted to v4: $titleDeploy" -ForegroundColor Green

          ## Graduate: commit v4 back to repo, remove v3 script + flag
          Write-Host "--- Graduating title to v4 (committing back to repo) ---" -ForegroundColor Cyan
          try {
            git config user.email "spa-pipeline@fiserv.com"
            git config user.name "SPA Pipeline"
            git add $titleDeploy
            if (Test-Path $v3Script) { git rm $v3Script 2>$null }

            $pkgYamlPath = 'windows/package.yaml'
            if (Test-Path $pkgYamlPath) {
              $pkgContent = Get-Content $pkgYamlPath -Raw
              $pkgContent = $pkgContent -replace '(?m)^\s*#\s*Pipeline will auto-convert.*\r?\n', ''
              $pkgContent = $pkgContent -replace '(?m)^\s*v3_conversion:\s*true\s*\r?\n?', ''
              $pkgContent | Set-Content $pkgYamlPath -NoNewline
              git add $pkgYamlPath
            }

            git commit -m "chore: graduate v3 → v4 (auto-converted by pipeline)" --allow-empty
            git push "https://gitlab-ci-token:$($env:GITLAB_PUSH_TOKEN)@$($env:CI_SERVER_HOST)/$($env:CI_PROJECT_PATH).git" HEAD:$($env:CI_COMMIT_REF_NAME)
            Write-Host "  ✓ v4 script committed — future builds will use v4 directly" -ForegroundColor Green
          } catch {
            Write-Warning "⚠ Could not commit v4 back to repo: $_"
            Write-Warning "  The build will continue, but the v3 script will be re-converted on next build."
          }
        } else {
          throw "Convert-ADTDeployment did not produce $titleDeploy — check compatibility report above."
        }

      } elseif (!(Test-Path $titleDeploy)) {
        throw "Missing windows/lifecycle.yaml, windows/src/Deploy-Application.ps1, and windows/src/Invoke-AppDeployToolkit.ps1 — cannot build."
      } else {
        Write-Host "Using committed Invoke-AppDeployToolkit.ps1 (no lifecycle.yaml found)"
      }

      ## 4 — Build staging area
      $staging = Join-Path $env:TEMP ("psadt_build_" + [guid]::NewGuid())
      New-Item -ItemType Directory -Path $staging | Out-Null

      # Copy enterprise framework template
      Copy-Item -Path (Join-Path $frameworkDir '*') -Destination $staging -Recurse -Force

      # Overlay title's Invoke-AppDeployToolkit.ps1 (PSADT v4)
      Write-Host "Overlaying title Invoke-AppDeployToolkit.ps1..."
      Copy-Item -Path $titleDeploy -Destination $staging -Force

      # Copy installer from runner VM if WINDOWS_INSTALLER_SOURCE is set
      if ($env:WINDOWS_INSTALLER_SOURCE) {
        $subDir   = if ($env:WINDOWS_INSTALLER_SUBFOLDER) { $env:WINDOWS_INSTALLER_SUBFOLDER.Trim('\').Trim('/') } else { '' }
        $filesDir = if ($subDir) { Join-Path 'windows\src\Files' $subDir } else { 'windows\src\Files' }
        if (!(Test-Path $filesDir)) { New-Item -ItemType Directory -Path $filesDir -Force | Out-Null }
        if (Test-Path $env:WINDOWS_INSTALLER_SOURCE) {
          Write-Host "Copying installer from: $($env:WINDOWS_INSTALLER_SOURCE) -> $filesDir"
          Copy-Item -Path $env:WINDOWS_INSTALLER_SOURCE -Destination $filesDir -Force
        } else {
          throw "WINDOWS_INSTALLER_SOURCE set but file not found: $($env:WINDOWS_INSTALLER_SOURCE)"
        }
      }

      # Copy support files from runner VM if WINDOWS_SUPPORT_FILES_SOURCE is set
      if ($env:WINDOWS_SUPPORT_FILES_SOURCE) {
        $supportDir = 'windows\src\SupportFiles'
        if (!(Test-Path $supportDir)) { New-Item -ItemType Directory -Path $supportDir | Out-Null }
        if (Test-Path $env:WINDOWS_SUPPORT_FILES_SOURCE) {
          $supportItems = Get-ChildItem -Path $env:WINDOWS_SUPPORT_FILES_SOURCE -File -ErrorAction SilentlyContinue
          if ($supportItems.Count -gt 0) {
            Write-Host "Copying $($supportItems.Count) support files from: $($env:WINDOWS_SUPPORT_FILES_SOURCE) -> $supportDir"
            Copy-Item -Path (Join-Path $env:WINDOWS_SUPPORT_FILES_SOURCE '*') -Destination $supportDir -Recurse -Force
          } else {
            Write-Host "WINDOWS_SUPPORT_FILES_SOURCE set but directory is empty: $($env:WINDOWS_SUPPORT_FILES_SOURCE)"
          }
        } else {
          Write-Host "⚠️ WINDOWS_SUPPORT_FILES_SOURCE set but path not found: $($env:WINDOWS_SUPPORT_FILES_SOURCE)" -ForegroundColor Yellow
        }
      }

      # Overlay src/ content (Files, SupportFiles, Assets)
      foreach ($subDir in @('Files','SupportFiles','Assets')) {
        $srcPath = Join-Path 'windows/src' $subDir
        if (Test-Path $srcPath) {
          $dstPath = Join-Path $staging $subDir
          if (!(Test-Path $dstPath)) { New-Item -ItemType Directory -Path $dstPath | Out-Null }
          Copy-Item -Path (Join-Path $srcPath '*') -Destination $dstPath -Recurse -Force
        }
      }

      # Overlay Config and Strings overrides
      foreach ($cfgFile in @('Config\config.psd1','Strings\strings.psd1')) {
        $src = Join-Path 'windows/src' $cfgFile
        if (Test-Path $src) {
          $dst = Join-Path $staging $cfgFile
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
          Copy-Item -Path $src -Destination $dst -Force
        }
      }

      ## 4b — Validate staging area has required PSADT files
      $requiredFiles = @('Invoke-AppDeployToolkit.exe', 'Invoke-AppDeployToolkit.ps1')
      foreach ($req in $requiredFiles) {
        $reqPath = Join-Path $staging $req
        if (!(Test-Path $reqPath)) {
          Write-Host "❌ MISSING in staging: $req" -ForegroundColor Red
        } else {
          Write-Host "  ✓ Staging has: $req" -ForegroundColor Green
        }
      }
      $stagingFilesDir = Join-Path $staging 'Files'
      if (Test-Path $stagingFilesDir) {
        $installerCount = (Get-ChildItem -Path $stagingFilesDir -File | Where-Object { $_.Name -ne '.gitkeep' }).Count
        Write-Host "  ✓ Staging Files/ contains $installerCount installer file(s)" -ForegroundColor Green
      } else {
        Write-Host "⚠ Staging Files/ directory not found — no installer binary!" -ForegroundColor Yellow
      }

      ## 5 — Copy staging area to out/staging/ for artifact handoff to deploy-intune
      $outDir = 'out'
      if (!(Test-Path $outDir)) { New-Item -ItemType Directory -Path $outDir | Out-Null }

      $stagingArtifact = Join-Path $outDir 'staging'
      Write-Host "Copying staging area to: $stagingArtifact" -ForegroundColor DarkGray
      Copy-Item -Path $staging -Destination $stagingArtifact -Recurse -Force

      Write-Host "=== Staging area contents (out/staging/) ===" -ForegroundColor DarkGray
      Get-ChildItem -Path $stagingArtifact -Recurse | ForEach-Object {
        $rel = $_.FullName.Substring($stagingArtifact.Length)
        $size = if (!$_.PSIsContainer) { " ($($_.Length) bytes)" } else { "" }
        Write-Host "  $rel$size" -ForegroundColor DarkGray
      }

      ## 6 — Write build.env (package metadata only — no INTUNEWIN_PATH)
      ##     IntuneWinAppUtil runs in the deploy-intune job, which reads this dotenv
      ##     and adds INTUNEWIN_PATH after packaging.
      $winPkg      = Get-Content 'windows/package.yaml' -Raw
      $safeName    = ($app.package_id -replace '[^a-z0-9\-]', '-')

      # Extract version from package.yaml
      if ($winPkg -match "(?m)^version:\s*[`"']?([^`"'`r`n]+)[`"']?\s*$") {
        $vendorVer = $Matches[1].Trim().Trim('"').Trim("'")
      } else { $vendorVer = $app.version }

      if ($winPkg -match 'packaging_version:\s*(\d+)') {
        $pkgVer = $Matches[1].Trim()
      } else { $pkgVer = '1' }

      $builtAt = (Get-Date -Format 'o')

      $dotenv = @(
        "PACKAGE_ID=$($app.package_id)",
        "PACKAGE_SAFE_NAME=$safeName",
        "VENDOR_VERSION=$vendorVer",
        "PACKAGING_VERSION=$pkgVer",
        "PLATFORM=windows",
        "BUILT_AT=$builtAt"
      ) -join "`n"
      $dotenv | Out-File (Join-Path $outDir 'build.env') -Encoding ascii -Force
      Write-Host "Dotenv written: out/build.env"
      Write-Host "✅ Build complete — staging area ready for deploy-intune" -ForegroundColor Green

  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - out/staging/
      - out/build.env
    reports:
      dotenv: out/build.env

windows_build:
  extends: .windows_build
  rules:
    # Run on version tags (production release)
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $WINDOWS_ENABLED == "true"
    # Run on main branch (testing without tags)
    - if: $CI_COMMIT_BRANCH == "main" && $WINDOWS_ENABLED == "true"
  cache:
    # Cache the extracted framework bundle by version on the runner's local disk.
    # Works as-is for a static Azure VM runner.
    #
    # ── VMSS (future) ─────────────────────────────────────────────────────────
    # When moving to VMSS, enable Azure Blob Storage as the cache backend in
    # config.toml on the VMSS base image so the cache is shared across instances:
    #
    #   [runners.cache]
    #     Type = "azure"
    #     Shared = true
    #     [runners.cache.azure]
    #       AccountName   = "yourstorageaccount"
    #       AccountKey    = "<storage-account-key-or-SAS>"
    #       ContainerName = "gitlab-runner-cache"
    # ──────────────────────────────────────────────────────────────────────────
    key: psadt-framework-$PSADT_FRAMEWORK_VERSION
    paths:
      - psadt-framework-$PSADT_FRAMEWORK_VERSION/
    policy: pull-push
