##=============================================================================
## macos-deploy-jamf.yml — macOS Jamf Pro deploy via Terraform CI template
## Include: project: <group>/gitlab-ci-templates, file: templates/macos-deploy-jamf.yml
##
## Variables consumed:
##   MACOS_ENABLED                — Must be 'true'
##   JAMF_INSTANCE_URL            — Jamf Pro FQDN (e.g. yourorg.jamfcloud.com)
##   JAMF_CLIENT_ID               — Jamf API client ID (OAuth)
##   JAMF_CLIENT_SECRET           — Jamf API client secret (protected CI var)
##   GITLAB_READ_TOKEN            — Token to clone terraform-jamf-modules
##   TF_JAMF_MODULES_REF          — ref/tag for terraform-jamf-modules (default: main)
##
## Installer source options:
##   Option A — file committed to git:
##     The .pkg/.dmg is committed to macos/src/Files/ (legacy, not recommended for large files).
##     No additional configuration needed. needs: [] is correct.
##
##   Option B — Windows SMB file share (recommended):
##     The SPA Workbench generates a 'fetch-mac-installer' prepare-stage job that pulls
##     the binary from an SMB share into macos/src/Files/ as a GitLab artifact.
##     Titles using this approach MUST override 'needs' in their .gitlab-ci.yml:
##
##       macos_deploy_jamf:
##         needs: [fetch-mac-installer]
##
##     The wizard generates this override automatically when SMB is configured.
##
## No macOS runner required — runs on default GitLab runners (hashicorp/terraform:1.7).
## Terraform state is managed by GitLab (HTTP backend).
##=============================================================================

macos_deploy_jamf:
  stage: deploy
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  needs: []   # override to [fetch-mac-installer] in title's .gitlab-ci.yml when using SMB
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/ && $MACOS_ENABLED == "true"
      when: on_success
    - if: $MACOS_ENABLED == "true"
      when: manual
      allow_failure: true
  variables:
    TF_JAMF_MODULES_REF: "main"
    TF_STATE_NAME: "jamf-deploy"
  before_script:
    - apk add --no-cache bash git jq 2>/dev/null || true
  script:
    - |
      set -euo pipefail

      echo "═══════════════════════════════════════════════════════"
      echo "  macOS Jamf Deployment — $CI_PROJECT_NAME"
      echo "═══════════════════════════════════════════════════════"

      # ── 1. Clone terraform-jamf-modules ──────────────────────
      echo "[1/4] Cloning terraform-jamf-modules (ref: $TF_JAMF_MODULES_REF)..."
      git clone --depth 1 --branch "$TF_JAMF_MODULES_REF" \
        "https://gitlab-ci-token:${GITLAB_READ_TOKEN}@${CI_SERVER_HOST}/euc/software-package-automation/spa-deployment/terraform-jamf-modules.git" \
        terraform-jamf-modules

      # ── 2. Locate the package file ───────────────────────────
      echo "[2/4] Locating package file..."
      PKG_FILE=$(find macos/src/Files -type f \( -name '*.pkg' -o -name '*.dmg' \) | head -1)
      if [ -z "$PKG_FILE" ]; then
        echo "❌ No .pkg or .dmg found in macos/src/Files/"
        exit 1
      fi
      echo "  Found: $PKG_FILE"
      PKG_PATH="$(pwd)/$PKG_FILE"

      # ── 3. Generate Terraform config ─────────────────────────
      echo "[3/4] Generating Terraform config..."
      bash terraform-jamf-modules/scripts/Build-JamfTerraform.sh \
        --jamf-input-dir  macos/jamf \
        --package-yaml    macos/package.yaml \
        --package-path    "$PKG_PATH" \
        --modules-dir     terraform-jamf-modules/modules \
        --output-dir      tf-deploy

      # ── 4. Terraform init + apply ────────────────────────────
      echo "[4/4] Running Terraform..."
      cd tf-deploy

      terraform init \
        -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}" \
        -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" \
        -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" \
        -backend-config="username=gitlab-ci-token" \
        -backend-config="password=${CI_JOB_TOKEN}" \
        -backend-config="lock_method=POST" \
        -backend-config="unlock_method=DELETE" \
        -backend-config="retry_wait_min=5"

      # Ensure JAMF_INSTANCE_URL has https:// prefix
      JAMF_URL="${JAMF_INSTANCE_URL}"
      [[ "$JAMF_URL" != https://* ]] && JAMF_URL="https://${JAMF_URL}"

      terraform plan \
        -var="jamf_instance_url=${JAMF_URL}" \
        -var="jamf_client_id=${JAMF_CLIENT_ID}" \
        -var="jamf_client_secret=${JAMF_CLIENT_SECRET}" \
        -var="package_file_path=${PKG_PATH}" \
        -out=tfplan

      terraform apply -auto-approve tfplan

      echo ""
      echo "═══════════════════════════════════════════════════════"
      echo "  ✅ macOS deployment complete!"
      echo "═══════════════════════════════════════════════════════"

  artifacts:
    name: "jamf-terraform-$CI_COMMIT_SHORT_SHA"
    when: always          # preserve on failure too — useful for debugging
    expire_in: 7 days
    paths:
      - tf-deploy/**/*.tf         # all generated HCL files
      - tf-deploy/tfplan          # the saved terraform plan
      - tf-deploy/*.tfvars        # any variable files
      - tf-deploy/*.json          # any JSON inputs copied into the deploy dir
    exclude:
      - tf-deploy/.terraform/**   # provider binaries — large and not useful to store
