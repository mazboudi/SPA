##=============================================================================
## windows-deploy-intune.yml — Windows Intune publish + assign CI template
## Include: project: <group>/gitlab-ci-templates, file: templates/windows-deploy-intune.yml
##
## Variables consumed:
##   WINDOWS_ENABLED       — Must be 'true'
##   AZURE_TENANT_ID       — Microsoft Entra (AAD) tenant ID
##   AZURE_CLIENT_ID       — App registration client ID
##   AZURE_CLIENT_SECRET   — App registration client secret (protected CI var)
##   INTUNE_DRY_RUN        — 'true' to skip actual Graph writes (default: false)
##   INTUNE_MODULES_REF    — ref/tag for intune-deployment-modules scripts
##   INTUNE_MODULES_PROJECT_ID — project ID for intune-deployment-modules repo
##   GITLAB_READ_TOKEN     — Token to download scripts from the modules repo
##   PSADT_FRAMEWORK_VERSION — e.g. '4.1.0' (needed to locate IntuneWinAppUtil in bundle)
##   PSADT_PROJECT_ID      — GitLab project ID of psadt-enterprise repo (for IntuneWinAppUtil)
##
## Needs: windows_build job (consumes out/build.env + out/staging/ via artifacts)
##
## This job:
##   1. Runs IntuneWinAppUtil on the staging area produced by windows_build to
##      create the .intunewin package (moved here so the PSADT package zip can
##      be downloaded without generating the large .intunewin binary).
##   2. Publishes / updates the Win32 app in Intune via the Graph API.
##=============================================================================

## ---------------------------------------------------------------------------
## Shared helper: download intune-deployment-modules scripts
## ---------------------------------------------------------------------------
.download_intune_modules: &download_intune_modules |
  $ErrorActionPreference = "Stop"
  $modulesDir = 'intune-modules'
  if (!(Test-Path $modulesDir)) {
    New-Item -ItemType Directory -Path $modulesDir | Out-Null
  }
  $headers = @{ 'PRIVATE-TOKEN' = $env:GITLAB_READ_TOKEN }
  $scripts = @(
    'Publish-Win32App.ps1',
    'Remove-Win32App.ps1',
    'Upload-Win32Content.ps1',
    'Update-Win32App.ps1',
    'Resolve-DetectionRules.ps1',
    'Resolve-Requirements.ps1',
    'Set-Win32Assignments.ps1',
    'Set-Win32Supersedence.ps1',
    'Set-Win32Dependencies.ps1',
    'Set-Win32Relationships.ps1',
    'IntuneDeployment.psm1'
  )
  $ref = $env:INTUNE_MODULES_REF ?? 'main'
  foreach ($s in $scripts) {
    $encoded = [uri]::EscapeDataString("scripts/$s")
    $uri = "$($env:CI_API_V4_URL)/projects/$($env:INTUNE_MODULES_PROJECT_ID)/repository/files/$encoded/raw?ref=$ref"
    $dest = Join-Path $modulesDir $s
    try {
      Invoke-WebRequest -Uri $uri -Headers $headers -OutFile $dest -ErrorAction Stop
    } catch {
      Write-Warning "Could not download $s from intune-deployment-modules. Skipping."
    }
  }
  Write-Host "Intune modules ready in: $modulesDir"

## ---------------------------------------------------------------------------
## publish_intune — Package with IntuneWinAppUtil, then create / update in Intune
## ---------------------------------------------------------------------------
.windows_publish_intune:
  stage: publish
  tags: [Windows]
  variables:
    INTUNE_DRY_RUN: "false"
    INTUNE_MODULES_REF: "main"
    PSADT_FRAMEWORK_VERSION: "4.1.0"
  needs:
    - job: windows_build
      artifacts: true
      optional: true
  script:
    - *download_intune_modules
    - |
      $ErrorActionPreference = "Stop"

      ## ── Step 1: Run IntuneWinAppUtil on the staging area ─────────────────
      ## The staging area was assembled by windows_build and passed as an artifact.
      ## We run IntuneWinAppUtil here so the PSADT package can be downloaded
      ## without the large .intunewin file being generated during the build stage.

      if (!(Test-Path 'out/staging')) {
        throw "out/staging not found. Ensure windows_build completed successfully and artifacts are available."
      }

      # Resolve IntuneWinAppUtil.exe
      # Priority: C:\tools (pre-installed on runner) → framework bundle tools\ → bundle root
      $intuneUtil = $null

      # Try to locate the cached framework bundle (same version used by build)
      $frameworkDir = "psadt-framework-$($env:PSADT_FRAMEWORK_VERSION)"

      # If the framework is not already cached on this runner, download it
      if (!(Test-Path $frameworkDir)) {
        Write-Host "Framework bundle not cached — downloading for IntuneWinAppUtil..." -ForegroundColor DarkGray
        $pkgUri = "$($env:CI_API_V4_URL)/projects/$($env:PSADT_PROJECT_ID)/packages/generic/psadt-enterprise/$($env:PSADT_FRAMEWORK_VERSION)/psadt-enterprise-$($env:PSADT_FRAMEWORK_VERSION).zip"
        $headers = @{ 'PRIVATE-TOKEN' = $env:GITLAB_READ_TOKEN }
        $zipPath = "$frameworkDir.zip"
        Invoke-WebRequest -Uri $pkgUri -Headers $headers -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $frameworkDir -Force
        Remove-Item $zipPath
        Write-Host "Framework extracted to: $frameworkDir"
      }

      $candidates = @(
        'C:\tools\IntuneWinAppUtil.exe',                          # pre-installed on runner
        (Join-Path $frameworkDir 'tools\IntuneWinAppUtil.exe'),   # bundled in psadt-enterprise zip
        (Join-Path $frameworkDir 'IntuneWinAppUtil.exe')           # legacy bundle root location
      )
      foreach ($candidate in $candidates) {
        if (Test-Path $candidate) { $intuneUtil = $candidate; break }
      }
      if (-not $intuneUtil) {
        throw "IntuneWinAppUtil.exe not found. Install it at C:\tools\IntuneWinAppUtil.exe on the runner, or include tools/ in the psadt-enterprise bundle."
      }
      Write-Host "Using IntuneWinAppUtil: $intuneUtil"

      # Create output directory and run IntuneWinAppUtil
      $outDir = 'out'
      if (!(Test-Path $outDir)) { New-Item -ItemType Directory -Path $outDir | Out-Null }

      $staging   = 'out/staging'
      $setupFile = 'Invoke-AppDeployToolkit.exe'

      Write-Host "Running IntuneWinAppUtil..." -ForegroundColor Cyan
      & $intuneUtil -c $staging -s $setupFile -o (Resolve-Path $outDir) -q

      # Rename output deterministically using metadata from build.env
      # PACKAGE_ID, PACKAGE_SAFE_NAME, VENDOR_VERSION, PACKAGING_VERSION are
      # injected as CI variables from the windows_build dotenv artifact.
      $safeName = if ($env:PACKAGE_SAFE_NAME) { $env:PACKAGE_SAFE_NAME } else { $env:PACKAGE_ID -replace '[^a-z0-9\-]', '-' }
      $vendorVer = $env:VENDOR_VERSION
      $pkgVer    = $env:PACKAGING_VERSION ?? '1'

      $produced = Get-ChildItem -Path $outDir -Filter '*.intunewin' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
      if (-not $produced) { throw "No .intunewin file produced in $outDir" }

      $targetName = "${safeName}_${vendorVer}_${pkgVer}.intunewin"
      $targetPath = Join-Path $outDir $targetName
      Move-Item -Path $produced.FullName -Destination $targetPath -Force

      # Compute checksum
      $sha256  = (Get-FileHash -Path $targetPath -Algorithm SHA256).Hash.ToLower()
      $env:INTUNEWIN_PATH     = $targetPath
      $env:INTUNEWIN_FILENAME = $targetName
      $env:INTUNEWIN_SHA256   = $sha256

      Write-Host "✅ Packaged: $targetPath (SHA256: $sha256)" -ForegroundColor Green

      ## ── Step 2: Publish to Intune ─────────────────────────────────────────
      if (-not $env:INTUNEWIN_PATH) { throw "INTUNEWIN_PATH not set after packaging step." }

      # Import shared module
      if (Test-Path 'intune-modules/IntuneDeployment.psm1') {
        Import-Module (Resolve-Path 'intune-modules/IntuneDeployment.psm1') -Force
      }

      # Build detection rules from windows/package.yaml
      # @() forces the result into an array — PowerShell unwraps single-element
      # script outputs, which causes Graph API to receive a bare object not an array.
      $detectionRules = @(& 'intune-modules/Resolve-DetectionRules.ps1' `
        -PackageYamlPath 'windows/package.yaml')
      Write-Host "Detection rules count: $($detectionRules.Count)"

      # Build hardware requirements + custom requirement rules from windows/intune/requirements.json
      $hardwareRequirements = @{}
      $requirementRules = @()
      if (Test-Path 'windows/intune/requirements.json') {
        $resolved = & 'intune-modules/Resolve-Requirements.ps1' `
          -RequirementsPath 'windows/intune/requirements.json'
        $hardwareRequirements = $resolved.hardware
        $requirementRules = $resolved.requirementRules
      }

      # Publish (creates or updates) the Win32 app
      $publishArgs = @{
        IntuneWinPath        = $env:INTUNEWIN_PATH
        AppJsonPath          = 'windows/intune/app.json'
        PackageYamlPath      = 'windows/package.yaml'
        DetectionRules       = $detectionRules
        HardwareRequirements = $hardwareRequirements
        TenantId             = $env:AZURE_TENANT_ID
        ClientId             = $env:AZURE_CLIENT_ID
        ClientSecret         = $env:AZURE_CLIENT_SECRET
        DryRun               = [bool]::Parse($env:INTUNE_DRY_RUN)
      }
      if ($requirementRules.Count -gt 0) {
        $publishArgs['RequirementRules'] = $requirementRules
      }

      # If the title was previously published to Intune (edit flow), pass the
      # old app ID so Publish-Win32App.ps1 can delete it before creating the new
      # version — prevents catalogue duplicates.
      $appJsonRaw = Get-Content 'windows/intune/app.json' -Raw | ConvertFrom-Json -ErrorAction SilentlyContinue
      $previousAppId = $appJsonRaw.syncIntuneAppId
      if ($previousAppId -and $previousAppId -match '^[0-9a-f\-]{36}$') {
        Write-Host "🔁 Edit mode: will replace existing Intune app $previousAppId" -ForegroundColor Cyan
        $publishArgs['PreviousAppId'] = $previousAppId
      }

      & 'intune-modules/Publish-Win32App.ps1' @publishArgs

      # ── App relationships: supersedence + dependencies ────────────────────
      # Read the APP_ID that Publish-Win32App.ps1 just wrote to out/app.env
      $publishedAppId = ''
      if (Test-Path 'out/app.env') {
        $appEnvLine = Get-Content 'out/app.env' | Where-Object { $_ -match '^APP_ID=' } | Select-Object -First 1
        $publishedAppId = ($appEnvLine -replace '^APP_ID=','').Trim()
      }

      if ($publishedAppId -and $publishedAppId -ne 'DRY-RUN') {
        # Set supersedence + dependencies in ONE call.
        # updateRelationships is a replace-all operation: two separate calls would
        # cause the second to silently overwrite the first.
        $hasSupersedence = Test-Path 'windows/intune/supersedence.json'
        $hasDependencies = Test-Path 'windows/intune/dependencies.json'
        if ($hasSupersedence -or $hasDependencies) {
          Write-Host "Setting app relationships (supersedence + dependencies)..."
          & 'intune-modules/Set-Win32Relationships.ps1' `
            -AppId            $publishedAppId `
            -SupersedencePath 'windows/intune/supersedence.json' `
            -DependenciesPath 'windows/intune/dependencies.json' `
            -TenantId         $env:AZURE_TENANT_ID `
            -ClientId         $env:AZURE_CLIENT_ID `
            -ClientSecret     $env:AZURE_CLIENT_SECRET
        }

        # ── Persist new app ID back into app.json so next edit knows what to replace ──
        # This prevents catalogue duplicates on future republish cycles.
        $appJsonPath = 'windows/intune/app.json'
        try {
          $appJsonContent = Get-Content $appJsonPath -Raw | ConvertFrom-Json
          $appJsonContent | Add-Member -NotePropertyName 'syncIntuneAppId' -NotePropertyValue $publishedAppId -Force
          $appJsonContent | ConvertTo-Json -Depth 10 | Set-Content $appJsonPath -Encoding utf8 -NoNewline
          Write-Host "✅ syncIntuneAppId updated in app.json: $publishedAppId" -ForegroundColor Green

          # Commit the updated app.json back to the repo
          git config user.email "ci-bot@spa-pipeline"
          git config user.name "SPA Pipeline Bot"
          git add $appJsonPath
          $changed = (git status --porcelain $appJsonPath).Trim()
          if ($changed) {
            git commit -m "ci: update syncIntuneAppId to $publishedAppId [skip ci]"
            git push "https://gitlab-ci-token:$($env:CI_JOB_TOKEN)@$($env:CI_SERVER_HOST)/$($env:CI_PROJECT_PATH).git" HEAD:$($env:CI_COMMIT_REF_NAME)
            Write-Host "✅ app.json committed with new syncIntuneAppId" -ForegroundColor Green
          } else {
            Write-Host "ℹ️  app.json syncIntuneAppId already up to date — no commit needed." -ForegroundColor DarkGray
          }
        } catch {
          Write-Log "WARNING: Could not update syncIntuneAppId in app.json — $($_.Exception.Message)" WARN -LogFile $logFile
          Write-Host "⚠️  Could not persist syncIntuneAppId: $($_.Exception.Message)" -ForegroundColor Yellow
          # Non-fatal — the app was still published successfully
        }
      } else {
        Write-Host "Dry run or no APP_ID — skipping supersedence/dependencies." -ForegroundColor DarkGray
      }
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - out/*.intunewin
      - out/app.env
      - out/publish-logs/*
    reports:
      dotenv: out/app.env

## ---------------------------------------------------------------------------
## assign_intune — Assign the Win32 app to AAD groups
## ---------------------------------------------------------------------------
.windows_assign_intune:
  stage: assign
  tags: [Windows]
  variables:
    INTUNE_DRY_RUN: "false"
  needs:
    - job: windows_publish_intune
      artifacts: true
      optional: true
  script:
    - *download_intune_modules
    - |
      $ErrorActionPreference = "Stop"
      if (-not $env:APP_ID) { throw "APP_ID not set. Check out/app.env from publish job." }

      if (!(Test-Path 'windows/intune/assignments.json')) {
        Write-Warning "windows/intune/assignments.json not found — skipping assignments."
        exit 0
      }

      & 'intune-modules/Set-Win32Assignments.ps1' `
        -AppId            $env:APP_ID `
        -AssignmentsPath  'windows/intune/assignments.json' `
        -TenantId         $env:AZURE_TENANT_ID `
        -ClientId         $env:AZURE_CLIENT_ID `
        -ClientSecret     $env:AZURE_CLIENT_SECRET `
        -DryRun:([bool]::Parse($env:INTUNE_DRY_RUN))

      # Supersedence + dependencies in ONE combined call — updateRelationships is
      # replace-all, so two separate calls would cause the second to overwrite the first.
      $hasSupersedence = Test-Path 'windows/intune/supersedence.json'
      $hasDependencies = Test-Path 'windows/intune/dependencies.json'
      if ($hasSupersedence -or $hasDependencies) {
        Write-Host "Setting app relationships (supersedence + dependencies)..."
        & 'intune-modules/Set-Win32Relationships.ps1' `
          -AppId            $env:APP_ID `
          -SupersedencePath 'windows/intune/supersedence.json' `
          -DependenciesPath 'windows/intune/dependencies.json' `
          -TenantId         $env:AZURE_TENANT_ID `
          -ClientId         $env:AZURE_CLIENT_ID `
          -ClientSecret     $env:AZURE_CLIENT_SECRET
      }
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - out/assign-logs/*

## ---------------------------------------------------------------------------
## Concrete jobs (extending the hidden templates)
##
## SPA_STAGE_LIMIT controls which stages execute when triggered from the
## workbench. Values: 'build' | 'publish' | 'assign' (default: all).
## When not set (e.g. manual push), the original rules apply for backward compat.
## ---------------------------------------------------------------------------
windows_publish_intune:
  extends: .windows_publish_intune
  rules:
    # Workbench-triggered: only run if SPA_STAGE_LIMIT allows publish+
    - if: $SPA_STAGE_LIMIT == "build" && $WINDOWS_ENABLED == "true"
      when: never
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $WINDOWS_ENABLED == "true"
    - if: $CI_COMMIT_BRANCH == "main" && $WINDOWS_ENABLED == "true"

windows_assign_intune:
  extends: .windows_assign_intune
  rules:
    # Workbench-triggered: skip if SPA_STAGE_LIMIT is build or publish
    - if: $SPA_STAGE_LIMIT == "build" && $WINDOWS_ENABLED == "true"
      when: never
    - if: $SPA_STAGE_LIMIT == "publish" && $WINDOWS_ENABLED == "true"
      when: never
    # Workbench-triggered with assign: auto-run (no manual click needed)
    - if: $SPA_STAGE_LIMIT == "assign" && $WINDOWS_ENABLED == "true"
      when: on_success
    # Non-workbench (manual push / tag): keep existing manual behavior
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $WINDOWS_ENABLED == "true"
      when: manual
    - if: $CI_COMMIT_BRANCH == "main" && $WINDOWS_ENABLED == "true"
      when: manual
