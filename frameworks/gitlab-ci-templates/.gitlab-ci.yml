##=============================================================================
## gitlab-ci-templates — Self-validation pipeline
##=============================================================================
## This repo is consumed by all title repos via `include: project:`.
## Its own pipeline validates that all template YAML files are syntactically
## correct and that the templates contain the required job definitions.
##
## Triggered on every commit and on vX.Y.Z tags (tags mark releases that
## title repos can pin to via `ref: vX.Y.Z`).
##
## No publish stage is needed: GitLab's `include: project:` mechanism reads
## directly from this repo's git history. A tag is enough to create a pin-able
## release. Optionally, create a GitLab Release from the tag for visibility.
##
## Runner requirements:
##   - A Linux or macOS runner tagged [Linux] or [macOS]
##   - gitlab-ci-lint (available via GitLab API — no extra tooling required)
##   - yamllint (pip install yamllint) for local YAML style checks
##=============================================================================

stages:
  - validate
  - release

variables:
  GIT_DEPTH: "1"

## ---------------------------------------------------------------------------
## validate_yaml_syntax — lint every template YAML file
## Uses the GitLab CI Lint API (no yamllint dependency required on runner)
## ---------------------------------------------------------------------------
validate_yaml_syntax:
  stage: validate
  tags: [Linux]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - |
      set -euo pipefail

      TEMPLATES_DIR="templates"
      ERRORS=0

      echo "=== Validating YAML syntax ==="
      for f in "$TEMPLATES_DIR"/*.yml; do
        echo -n "  Checking: $f ... "
        # GitLab CI Lint API: POST /api/v4/ci/lint
        # We send each file content individually (as a standalone file lint).
        HTTP_CODE=$(curl --silent --output /tmp/lint_response.json \
          --write-out "%{http_code}" \
          --request POST \
          --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"content\": $(python3 -c "import json,sys; print(json.dumps(open('$f').read()))")}" \
          "${CI_API_V4_URL}/ci/lint")

        if [[ "$HTTP_CODE" != "200" ]]; then
          echo "FAIL (HTTP $HTTP_CODE)"
          ERRORS=$((ERRORS+1))
          continue
        fi

        # Check if API reported valid
        VALID=$(python3 -c "import json,sys; d=json.load(open('/tmp/lint_response.json')); print(d.get('valid','false'))")
        if [[ "$VALID" == "True" || "$VALID" == "true" ]]; then
          echo "OK"
        else
          echo "INVALID"
          python3 -c "import json; d=json.load(open('/tmp/lint_response.json')); [print('    '+e) for e in d.get('errors',[])]"
          ERRORS=$((ERRORS+1))
        fi
      done

      echo ""
      if [[ $ERRORS -gt 0 ]]; then
        echo "❌ $ERRORS template(s) failed validation."
        exit 1
      fi
      echo "✅ All templates passed YAML validation."

## ---------------------------------------------------------------------------
## validate_required_jobs — verify each template defines expected job names
## ---------------------------------------------------------------------------
validate_required_jobs:
  stage: validate
  tags: [Linux]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - |
      set -euo pipefail

      check_job() {
        local file="$1"
        local job="$2"
        if grep -q "^${job}:" "$file" || grep -q "^\.${job}:" "$file"; then
          echo "  ✓ $file contains job: $job"
        else
          echo "  ✗ $file MISSING job: $job"
          return 1
        fi
      }

      ERRORS=0
      check_job templates/metadata-validate.yml   "metadata_validate"   || ERRORS=$((ERRORS+1))
      check_job templates/windows-build.yml       "windows_build"       || ERRORS=$((ERRORS+1))
      check_job templates/windows-deploy-intune.yml "windows_publish_intune" || ERRORS=$((ERRORS+1))
      check_job templates/windows-deploy-intune.yml "windows_assign_intune"  || ERRORS=$((ERRORS+1))
      check_job templates/macos-build.yml         "macos_build"         || ERRORS=$((ERRORS+1))
      check_job templates/macos-deploy-jamf.yml   "macos_deploy_jamf"   || ERRORS=$((ERRORS+1))

      if [[ $ERRORS -gt 0 ]]; then
        echo "❌ $ERRORS required job(s) missing from templates."
        exit 1
      fi
      echo "✅ All required jobs present in templates."

## ---------------------------------------------------------------------------
## create_release — create a GitLab release entry for the tag
## (makes it easy for title repos to browse available template versions)
## ---------------------------------------------------------------------------
create_release:
  stage: release
  tags: [Linux]
  needs: [validate_yaml_syntax, validate_required_jobs]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: on_success
  script:
    - |
      set -euo pipefail

      TAG_NAME="$CI_COMMIT_TAG"
      RELEASE_JSON=$(python3 -c "
      import json
      print(json.dumps({
        'name': f'gitlab-ci-templates $TAG_NAME',
        'tag_name': '$TAG_NAME',
        'description': f'CI template release $TAG_NAME. Reference in title repos with: ref: \"$TAG_NAME\".'
      }))
      ")

      HTTP_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
        --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$RELEASE_JSON" \
        --request POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      if [[ "$HTTP_CODE" == "201" ]]; then
        echo "✅ Release created: $TAG_NAME"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        echo "Release $TAG_NAME already exists — skipping."
      else
        echo "ERROR: HTTP $HTTP_CODE creating release."
        exit 1
      fi
  environment:
    name: production
    url: $CI_PROJECT_URL/-/releases
