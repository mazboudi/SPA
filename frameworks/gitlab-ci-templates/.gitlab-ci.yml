##=============================================================================
## gitlab-ci-templates — Self-validation pipeline
##=============================================================================
## This repo is consumed by all title repos via `include: project:`.
## Its own pipeline validates that all template YAML files are syntactically
## correct and that the templates contain the required job definitions.
##
## Triggered on every commit and on vX.Y.Z tags (tags mark releases that
## title repos can pin to via `ref: vX.Y.Z`).
##
## No publish stage is needed: GitLab's `include: project:` mechanism reads
## directly from this repo's git history. A tag is enough to create a pin-able
## release. A GitLab Release entry is created for visibility.
##
## Runner requirements:
##   - Any Linux runner (instance runners are fine — no special tags needed)
##   - curl, jq  (standard on most Linux CI images; install via package manager if missing)
##   - GITLAB_READ_TOKEN  — read_api scoped token (group CI variable)
##   - GITLAB_RELEASE_TOKEN — api scoped token (group CI variable, protected)
##=============================================================================

stages:
  - validate
  - release

variables:
  GIT_DEPTH: "1"

## ---------------------------------------------------------------------------
## validate_yaml_syntax — parse every template file for YAML syntax errors
## Uses Ruby (bundled on most Linux images) — no API calls, no tokens needed.
## ---------------------------------------------------------------------------
validate_yaml_syntax:
  stage: validate
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - |
      set -euo pipefail
      ERRORS=0

      echo "=== Validating YAML syntax ==="

      for f in templates/*.yml; do
        echo -n "  Checking: $f ... "

        if ruby -e "require 'yaml'; YAML.safe_load(File.read('$f'))" 2>/tmp/yaml_err; then
          echo "OK"
        else
          echo "INVALID"
          sed 's/^/    /' /tmp/yaml_err || true
          ERRORS=$((ERRORS+1))
        fi
      done

      echo ""
      if [[ $ERRORS -gt 0 ]]; then
        echo "❌ $ERRORS template(s) have YAML syntax errors."
        exit 1
      fi
      echo "✅ All templates passed YAML syntax check."

## ---------------------------------------------------------------------------
## validate_required_jobs — verify each template defines expected job names
## ---------------------------------------------------------------------------
validate_required_jobs:
  stage: validate
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - |
      set -euo pipefail

      check_job() {
        local file="$1"
        local job="$2"
        if grep -q "^${job}:" "$file" || grep -q "^\.${job}:" "$file"; then
          echo "  ✓ $file contains job: $job"
        else
          echo "  ✗ $file MISSING job: $job"
          return 1
        fi
      }

      ERRORS=0
      check_job templates/metadata-validate.yml     "metadata_validate"      || ERRORS=$((ERRORS+1))
      check_job templates/windows-build.yml         "windows_build"          || ERRORS=$((ERRORS+1))
      check_job templates/windows-deploy-intune.yml "windows_publish_intune" || ERRORS=$((ERRORS+1))
      check_job templates/windows-deploy-intune.yml "windows_assign_intune"  || ERRORS=$((ERRORS+1))
      check_job templates/macos-build.yml           "macos_build"            || ERRORS=$((ERRORS+1))
      check_job templates/macos-deploy-jamf.yml     "macos_deploy_jamf"      || ERRORS=$((ERRORS+1))

      if [[ $ERRORS -gt 0 ]]; then
        echo "❌ $ERRORS required job(s) missing from templates."
        exit 1
      fi
      echo "✅ All required jobs present in templates."

## ---------------------------------------------------------------------------
## create_release — create a GitLab release entry for the tag
## ---------------------------------------------------------------------------
create_release:
  stage: release
  needs: [validate_yaml_syntax, validate_required_jobs]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: on_success
  script:
    - |
      set -euo pipefail

      if ! command -v jq &>/dev/null; then
        yum install -y jq 2>/dev/null || apt-get install -y jq 2>/dev/null || true
      fi

      TAG_NAME="$CI_COMMIT_TAG"
      RELEASE_JSON=$(jq -n \
        --arg name "gitlab-ci-templates ${TAG_NAME}" \
        --arg tag  "${TAG_NAME}" \
        --arg desc "CI template release ${TAG_NAME}. Reference in title repos with: ref: \"${TAG_NAME}\"." \
        '{name: $name, tag_name: $tag, description: $desc}')

      HTTP_CODE=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
        --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$RELEASE_JSON" \
        --request POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      if [[ "$HTTP_CODE" == "201" ]]; then
        echo "✅ Release created: $TAG_NAME"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        echo "Release $TAG_NAME already exists — skipping."
      else
        echo "ERROR: HTTP $HTTP_CODE creating release."
        cat /tmp/release_response.json || true
        exit 1
      fi
  environment:
    name: production
    url: $CI_PROJECT_URL/-/releases
