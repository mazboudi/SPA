stages:
  - auth_test

auth_test_client_secret:
  stage: auth_test
  image: mcr.microsoft.com/powershell:lts-alpine

  before_script:
    # Helps with TLS and common HTTPS issues in Alpine containers
    - apk add --no-cache ca-certificates && update-ca-certificates

  script:
    - |
      cat > azure_client_secret_auth.ps1 <<'PS1'
      $ErrorActionPreference = "Stop"

      # Required variables
      $tenant   = $env:AZURE_TENANT_ID
      $clientId = $env:AZURE_CLIENT_ID
      $secret   = $env:AZURE_CLIENT_SECRET

      if ([string]::IsNullOrWhiteSpace($tenant))   { throw "AZURE_TENANT_ID is empty" }
      if ([string]::IsNullOrWhiteSpace($clientId)) { throw "AZURE_CLIENT_ID is empty" }
      if ([string]::IsNullOrWhiteSpace($secret))   { throw "AZURE_CLIENT_SECRET is empty" }

      # Token endpoint (v2)
      $tokenEndpoint = "https://login.microsoftonline.com/$tenant/oauth2/v2.0/token"

      # Client credentials with secret
      $body = @{
        client_id     = $clientId
        client_secret = $secret
        grant_type    = "client_credentials"
        scope         = "https://graph.microsoft.com/.default"
      }

      try {
        $resp = Invoke-RestMethod -Method Post -Uri $tokenEndpoint `
          -ContentType "application/x-www-form-urlencoded" -Body $body

        if (-not $resp.access_token) { throw "No access_token returned." }

        Write-Host "SUCCESS: access_token length:" $($resp.access_token.Length)

        # Optional: show expiry without printing token
        if ($resp.expires_in) {
          Write-Host "expires_in (seconds):" $resp.expires_in
        }
      }
      catch {
        Write-Host "FAILED calling token endpoint:"
        Write-Host $_
        throw
      }
      PS1
    - pwsh ./azure_client_secret_auth.ps1