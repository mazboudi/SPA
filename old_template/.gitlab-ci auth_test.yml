stages:
  - auth_test

auth_test:
  stage: auth_test
  image: mcr.microsoft.com/powershell:lts-alpine

  before_script:
    # Helps with TLS to internal GitLab and to Entra endpoints if your env uses custom CAs
    - apk add --no-cache ca-certificates && update-ca-certificates

  id_tokens:
    AZURE_FEDERATED_TOKEN:
      aud: "https://gitlab.onefiserv.net"

  script:
    - |
      cat > oidc_diag_and_auth.ps1 <<'PS1'
      $ErrorActionPreference = "Stop"
      function Decode-Base64Url([string]$b64u) {
        $b64 = $b64u.Replace('-', '+').Replace('_', '/')
        switch ($b64.Length % 4) { 2 { $b64+='=='}; 3 { $b64+='='} }
        [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($b64))
      }

      function Decode-JwtHeader([string]$jwt) {
        $parts = $jwt.Split('.')
        if ($parts.Length -lt 2) { throw "Not a JWT" }
        (Decode-Base64Url $parts[0]) | ConvertFrom-Json
      }

      function Decode-JwtPayload([string]$jwt) {
        $parts = $jwt.Split('.')
        if ($parts.Length -lt 2) { throw "Not a JWT" }
        (Decode-Base64Url $parts[1]) | ConvertFrom-Json
      }

      function EpochToUtc([Int64]$epoch) {
        try { [DateTimeOffset]::FromUnixTimeSeconds($epoch).UtcDateTime } catch { $null }
      }

      function Get-ExceptionResponseBody {
        param(
          [Parameter(Mandatory=$true)]
          $ErrorRecord
        )

        $ex = $ErrorRecord.Exception
        $out = [ordered]@{
          HttpStatus = $null
          Reason     = $null
          Body       = $null
        }

        # PowerShell 7+ typically uses HttpResponseMessage
        if ($ex -and ($ex.PSObject.Properties.Name -contains 'Response') -and $ex.Response) {
          $respObj = $ex.Response

          if ($respObj -is [System.Net.Http.HttpResponseMessage]) {
            try {
              $out.HttpStatus = [int]$respObj.StatusCode
              $out.Reason     = $respObj.ReasonPhrase
            } catch { }

            try {
              $out.Body = $respObj.Content.ReadAsStringAsync().GetAwaiter().GetResult()
            } catch { }
            return [pscustomobject]$out
          }

          # Legacy WebResponse path (Windows PowerShell / some environments)
          try {
            if ($respObj.GetResponseStream) {
              $stream = $respObj.GetResponseStream()
              if ($stream) {
                $reader = New-Object System.IO.StreamReader($stream)
                $out.Body = $reader.ReadToEnd()
                return [pscustomobject]$out
              }
            }
          } catch { }
        }

        # Fallback: sometimes the body is in ErrorDetails
        if ($ErrorRecord.ErrorDetails -and $ErrorRecord.ErrorDetails.Message) {
          $out.Body = $ErrorRecord.ErrorDetails.Message
        }

        return [pscustomobject]$out
      }

      # 0) Pull the assertion minted by GitLab
      $assertion = $env:AZURE_FEDERATED_TOKEN
      if ([string]::IsNullOrWhiteSpace($assertion)) { throw "AZURE_FEDERATED_TOKEN is empty" }

      # 1) Decode and show header + claims
      $hdr    = Decode-JwtHeader  $assertion
      $claims = Decode-JwtPayload $assertion

      Write-Host "===== OIDC TOKEN HEADER ====="
      Write-Host ("kid: {0}" -f $hdr.kid)
      Write-Host ("alg: {0}" -f $hdr.alg)
      Write-Host "============================="

      Write-Host "===== OIDC TOKEN CLAIMS ====="
      Write-Host ("iss: {0}" -f $claims.iss)

      $audJoin = if ($claims.aud -is [System.Array]) { ($claims.aud -join ", ") } else { $claims.aud }
      Write-Host ("aud: {0}" -f $audJoin)

      Write-Host ("sub: {0}" -f $claims.sub)

      if ($claims.iat) {
        $iatUtc = EpochToUtc ([int64]$claims.iat)
        Write-Host ("iat: {0} ({1} UTC)" -f $claims.iat, $iatUtc)
      }
      if ($claims.nbf) {
        $nbfUtc = EpochToUtc ([int64]$claims.nbf)
        Write-Host ("nbf: {0} ({1} UTC)" -f $claims.nbf, $nbfUtc)
      }
      if ($claims.exp) {
        $expUtc = EpochToUtc ([int64]$claims.exp)
        Write-Host ("exp: {0} ({1} UTC)" -f $claims.exp, $expUtc)
      }

      $nowEpoch = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
      Write-Host ("now(utc epoch): {0} ({1} UTC)" -f $nowEpoch, [DateTimeOffset]::UtcNow.UtcDateTime)

      if ($claims.exp -and ([int64]$claims.exp -lt $nowEpoch)) {
        Write-Warning "Token appears EXPIRED (exp < now)."
      }
      if ($claims.nbf -and ([int64]$claims.nbf -gt $nowEpoch)) {
        Write-Warning "Token is not valid yet (nbf > now)."
      }
      Write-Host "============================="

      # 2) Fetch discovery and JWKS from the issuer
      $issuer = [string]$claims.iss
      if ([string]::IsNullOrWhiteSpace($issuer)) { throw "Token has empty iss" }

      $discoUrl = ($issuer.TrimEnd('/')) + "/.well-known/openid-configuration"
      Write-Host ("Fetching discovery: {0}" -f $discoUrl)

      $disco = Invoke-RestMethod -Method Get -Uri $discoUrl

      Write-Host ("discovery.issuer: {0}" -f $disco.issuer)
      Write-Host ("discovery.jwks_uri: {0}" -f $disco.jwks_uri)

      if ($disco.issuer -ne $issuer) {
        Write-Warning ("Discovery issuer mismatch. disco.issuer={0} token.iss={1}" -f $disco.issuer, $issuer)
      }

      $jwks = Invoke-RestMethod -Method Get -Uri $disco.jwks_uri
      $keys = @($jwks.keys)
      $kids = $keys | ForEach-Object { $_.kid }

      Write-Host ("JWKS kids: {0}" -f ($kids -join ", "))

      if ($kids -contains $hdr.kid) {
        Write-Host ("Token kid {0} FOUND in JWKS." -f $hdr.kid)
      } else {
        Write-Warning ("Token kid {0} NOT found in JWKS. Entra validation will likely fail." -f $hdr.kid)
      }

      # 3) Attempt Entra token exchange (client_credentials + federated assertion)
      $tenant   = $env:AZURE_TENANT_ID
      $clientId = $env:AZURE_CLIENT_ID

      if ([string]::IsNullOrWhiteSpace($tenant))   { throw "AZURE_TENANT_ID is empty" }
      if ([string]::IsNullOrWhiteSpace($clientId)) { throw "AZURE_CLIENT_ID is empty" }

      Write-Host ("TENANT used: {0}" -f $tenant)
      Write-Host ("CLIENT_ID used: {0}" -f $clientId)

      $body = @{
        client_id             = $clientId
        scope                 = "https://graph.microsoft.com/.default"
        grant_type            = "client_credentials"
        client_assertion_type = "urn:ietf:params:oauth:client-assertion-type:jwt-bearer"
        client_assertion      = $assertion
      }

      $tokenEndpoint = "https://login.microsoftonline.com/$tenant/oauth2/v2.0/token"
      Write-Host ("Token endpoint: {0}" -f $tokenEndpoint)

      try {
        $resp = Invoke-RestMethod -Method Post -Uri $tokenEndpoint `
          -ContentType "application/x-www-form-urlencoded" -Body $body

        Write-Host ("SUCCESS: Graph access token length: {0}" -f $resp.access_token.Length)
      }
      catch {
        Write-Warning "Entra token exchange failed. Capturing response..."

        $r = Get-ExceptionResponseBody -ErrorRecord $_

        if ($r.HttpStatus) {
          Write-Host "----- HTTP STATUS -----"
          Write-Host ("{0} {1}" -f $r.HttpStatus, $r.Reason)
        }

        if ($r.Body) {
          Write-Host "----- HTTP ERROR BODY -----"
          Write-Host $r.Body
          Write-Host "---------------------------"
        } else {
          Write-Host "No HTTP error body was available."
        }

        # Helpful: attempt to parse JSON if it's JSON
        try {
          $json = $r.Body | ConvertFrom-Json
          if ($json.error) {
            Write-Host ("Parsed error: {0}" -f $json.error)
          }
          if ($json.error_description) {
            Write-Host ("Parsed error_description: {0}" -f $json.error_description)
          }
          if ($json.trace_id) {
            Write-Host ("trace_id: {0}" -f $json.trace_id)
          }
          if ($json.correlation_id) {
            Write-Host ("correlation_id: {0}" -f $json.correlation_id)
          }
          if ($json.timestamp) {
            Write-Host ("timestamp: {0}" -f $json.timestamp)
          }
        } catch {
          # ignore parse failures
        }

        throw
      } 
      PS1
    - pwsh ./oidc_diag_and_auth.ps1