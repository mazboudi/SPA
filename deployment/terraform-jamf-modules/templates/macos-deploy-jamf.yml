##=============================================================================
## macos-deploy-jamf.yml — CI Template
##=============================================================================
## Deploys a macOS .pkg/.dmg to Jamf Pro via Terraform.
##
## Prerequisites:
##   - CI/CD variables (inherited from group):
##       JAMF_INSTANCE_URL  — Jamf Pro FQDN (e.g. yourinstance.jamfcloud.com)
##       JAMF_CLIENT_ID     — API client ID
##       JAMF_CLIENT_SECRET — API client secret
##       GITLAB_READ_TOKEN  — For cloning terraform-jamf-modules
##
##   - The package file (.pkg or .dmg) must be in macos/src/Files/
##
##   - Title repo must contain:
##       macos/jamf/package-inputs.json
##       macos/jamf/policy-inputs.json
##       macos/jamf/scope-inputs.json
##
## Terraform state is managed by GitLab (HTTP backend).
##=============================================================================

.macos_deploy_base:
  stage: deploy
  tags: [Linux]
  image:
    name: hashicorp/terraform:1.7
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: on_success
    - when: never
  variables:
    TF_JAMF_MODULES_REF: "main"
    TF_STATE_NAME: "jamf-deploy"

macos_deploy_jamf:
  extends: .macos_deploy_base
  before_script:
    - apk add --no-cache bash git pwsh 2>/dev/null || true
  script:
    - |
      set -euo pipefail

      echo "═══════════════════════════════════════════════════════"
      echo "  macOS Jamf Deployment — $CI_PROJECT_NAME"
      echo "═══════════════════════════════════════════════════════"

      # ── 1. Clone terraform-jamf-modules ──────────────────────
      echo "[1/4] Cloning terraform-jamf-modules (ref: $TF_JAMF_MODULES_REF)..."
      git clone --depth 1 --branch "$TF_JAMF_MODULES_REF" \
        "https://gitlab-ci-token:${GITLAB_READ_TOKEN}@${CI_SERVER_HOST}/euc/software-package-automation/spa-frameworks/terraform-jamf-modules.git" \
        terraform-jamf-modules

      # ── 2. Locate the package file ───────────────────────────
      echo "[2/4] Locating package file..."
      PKG_FILE=$(find macos/src/Files -type f \( -name '*.pkg' -o -name '*.dmg' \) | head -1)
      if [ -z "$PKG_FILE" ]; then
        echo "❌ No .pkg or .dmg found in macos/src/Files/"
        exit 1
      fi
      echo "  Found: $PKG_FILE"
      PKG_PATH="$(pwd)/$PKG_FILE"

      # ── 3. Generate Terraform config ─────────────────────────
      echo "[3/4] Generating Terraform config..."
      pwsh -NoProfile -File terraform-jamf-modules/scripts/Build-JamfTerraform.ps1 \
        -JamfInputDir  macos/jamf \
        -PackagePath   "$PKG_PATH" \
        -ModulesDir    terraform-jamf-modules/modules \
        -OutputDir     tf-deploy

      # ── 4. Terraform init + apply ────────────────────────────
      echo "[4/4] Running Terraform..."
      cd tf-deploy

      terraform init \
        -backend-config="address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}" \
        -backend-config="lock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" \
        -backend-config="unlock_address=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock" \
        -backend-config="username=gitlab-ci-token" \
        -backend-config="password=${CI_JOB_TOKEN}" \
        -backend-config="lock_method=POST" \
        -backend-config="unlock_method=DELETE" \
        -backend-config="retry_wait_min=5"

      terraform plan \
        -var="jamf_instance_url=${JAMF_INSTANCE_URL}" \
        -var="jamf_client_id=${JAMF_CLIENT_ID}" \
        -var="jamf_client_secret=${JAMF_CLIENT_SECRET}" \
        -var="package_file_path=${PKG_PATH}" \
        -out=tfplan

      terraform apply -auto-approve tfplan

      echo ""
      echo "═══════════════════════════════════════════════════════"
      echo "  ✅ macOS deployment complete!"
      echo "═══════════════════════════════════════════════════════"
