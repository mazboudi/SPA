# Tanium Client 7.8.2.1149 - Refactored 7.8.2.1149 — Windows package definition
package_id: tanium-client-7821149-refactored
display_name: "Tanium Client 7.8.2.1149 - Refactored"
version: "7.8.2.1149"
packaging_version: "1"
installer_type: exe
source_filename: SetupClient.exe
max_install_time: 60

install_command: 'Invoke-AppDeployToolkit.exe -DeployMode Silent'
uninstall_command: 'Invoke-AppDeployToolkit.exe -DeploymentType Uninstall -DeployMode Silent'

detection_method: manual
detection_rules:
