include:
  - project: 'euc/software-package-automation/spa-frameworks/gitlab-ci-templates'
    ref: 'main'
    file:
      - 'templates/windows-build.yml'
      - 'templates/windows-deploy-intune.yml'

# Declare all stages used by the included templates.
stages:
  - build
  - publish
  - assign

variables:
  WINDOWS_ENABLED: "true"
  MACOS_ENABLED:   "false"
  PSADT_FRAMEWORK_VERSION: "4.1.0"
